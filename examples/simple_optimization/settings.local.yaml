project:
  name: mfix-exa-agentic-example
  env: local

mcp_server:
  host: 0.0.0.0
  port: 8080
  enabled_tools:
    - parse_output
    - validate_input

agent:
  model_provider: local
  model_name: loop-example
  max_iterations: 8

harness:
  simulator_cmd: "python examples/simple_optimization/objective.py"
  work_dir: "./workspace/runs"
  timeout_sec: 30

training:
  base_model: "meta-llama/Llama-3.1-8B"
  dataset_dir: "./data/curated"
  output_dir: "./artifacts/qlora"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
